<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stacked browser-window panels representing UI components">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b" />
      <stop offset="1" stop-color="#18181b" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fafafa" stop-opacity="0.10" />
      <stop offset="0.7" stop-color="#fafafa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f23" />
      <stop offset="1" stop-color="#161618" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fafafa" stop-opacity="0.85" />
      <stop offset="1" stop-color="#fafafa" stop-opacity="0.35" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.55" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glow)" />

  <!-- Background grid -->
  <g stroke="#fafafa" stroke-width="1" stroke-opacity="0.05">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600" />
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900" />
  </g>

  <!-- Back panel -->
  <g opacity="0.35" transform="translate(440 180)">
    <rect width="820" height="500" rx="18" fill="url(#panelGrad)" stroke="#3f3f46" stroke-width="1" />
    <rect width="820" height="44" rx="18" fill="#0f0f12" />
    <rect y="22" width="820" height="22" fill="#0f0f12" />
    <circle cx="24" cy="22" r="6" fill="#3f3f46" />
    <circle cx="46" cy="22" r="6" fill="#3f3f46" />
    <circle cx="68" cy="22" r="6" fill="#3f3f46" />
  </g>

  <!-- Middle panel -->
  <g opacity="0.65" transform="translate(390 250)">
    <rect width="820" height="500" rx="18" fill="url(#panelGrad)" stroke="#3f3f46" stroke-width="1" />
    <rect width="820" height="44" rx="18" fill="#0f0f12" />
    <rect y="22" width="820" height="22" fill="#0f0f12" />
    <circle cx="24" cy="22" r="6" fill="#52525b" />
    <circle cx="46" cy="22" r="6" fill="#52525b" />
    <circle cx="68" cy="22" r="6" fill="#52525b" />
  </g>

  <!-- Front panel -->
  <g transform="translate(340 320)" filter="url(#softShadow)">
    <rect width="820" height="500" rx="18" fill="url(#panelGrad)" stroke="#52525b" stroke-width="1" />
    <rect width="820" height="44" rx="18" fill="#0a0a0b" />
    <rect y="22" width="820" height="22" fill="#0a0a0b" />
    <circle cx="24" cy="22" r="6" fill="#71717a" />
    <circle cx="46" cy="22" r="6" fill="#71717a" />
    <circle cx="68" cy="22" r="6" fill="#71717a" />

    <!-- Header -->
    <rect x="36" y="80" width="220" height="22" rx="6" fill="url(#accentBar)" />
    <rect x="36" y="116" width="440" height="12" rx="3" fill="#3f3f46" />
    <rect x="36" y="138" width="320" height="12" rx="3" fill="#3f3f46" />

    <!-- Card row -->
    <g>
      <rect x="36" y="186" width="240" height="160" rx="10" fill="#0f0f12" stroke="#3f3f46" />
      <rect x="52" y="206" width="120" height="12" rx="3" fill="#52525b" />
      <rect x="52" y="226" width="80" height="10" rx="3" fill="#3f3f46" />
      <rect x="52" y="296" width="64" height="34" rx="6" fill="#fafafa" fill-opacity="0.85" />

      <rect x="290" y="186" width="240" height="160" rx="10" fill="#0f0f12" stroke="#3f3f46" />
      <rect x="306" y="206" width="160" height="12" rx="3" fill="#52525b" />
      <rect x="306" y="226" width="100" height="10" rx="3" fill="#3f3f46" />
      <circle cx="320" cy="316" r="14" fill="#fafafa" fill-opacity="0.7" />
      <circle cx="352" cy="316" r="14" fill="#fafafa" fill-opacity="0.45" />
      <circle cx="384" cy="316" r="14" fill="#fafafa" fill-opacity="0.25" />

      <rect x="544" y="186" width="240" height="160" rx="10" fill="#0f0f12" stroke="#3f3f46" />
      <rect x="560" y="206" width="140" height="12" rx="3" fill="#52525b" />
      <rect x="560" y="226" width="180" height="10" rx="3" fill="#3f3f46" />
      <path d="M560 326 L590 296 L620 316 L660 270 L700 290 L740 250" fill="none" stroke="#fafafa" stroke-opacity="0.75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Bottom row -->
    <rect x="36" y="378" width="372" height="88" rx="10" fill="#0f0f12" stroke="#3f3f46" />
    <rect x="56" y="402" width="180" height="12" rx="3" fill="#52525b" />
    <rect x="56" y="424" width="240" height="10" rx="3" fill="#3f3f46" />

    <rect x="424" y="378" width="360" height="88" rx="10" fill="#0f0f12" stroke="#3f3f46" />
    <rect x="444" y="402" width="160" height="12" rx="3" fill="#52525b" />
    <rect x="444" y="424" width="220" height="10" rx="3" fill="#3f3f46" />
  </g>
</svg>
