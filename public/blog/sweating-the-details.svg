<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Animation easing curves on a coordinate grid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b" />
      <stop offset="1" stop-color="#18181b" />
    </linearGradient>
    <radialGradient id="glow" cx="0.55" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#fafafa" stop-opacity="0.18" />
      <stop offset="0.6" stop-color="#fafafa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="primaryCurve" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#a1a1aa" />
      <stop offset="1" stop-color="#fafafa" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glow)" />

  <!-- Coordinate grid -->
  <g stroke="#fafafa" stroke-width="1" stroke-opacity="0.06">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600" />
    <path d="M150 0V900M350 0V900M550 0V900M750 0V900M950 0V900M1150 0V900M1350 0V900M1550 0V900" />
  </g>

  <!-- Faint ghost curves -->
  <g fill="none" stroke="#fafafa" stroke-opacity="0.10" stroke-width="3" stroke-linecap="round">
    <path d="M200 720 C 400 720, 600 680, 1400 200" />
    <path d="M200 720 C 800 720, 800 200, 1400 200" />
    <path d="M200 720 C 200 200, 1200 720, 1400 200" />
    <path d="M200 720 C 1000 720, 600 200, 1400 200" />
  </g>

  <!-- Highlighted easing curve -->
  <path d="M200 720 C 600 720, 1000 200, 1400 200"
        fill="none"
        stroke="url(#primaryCurve)"
        stroke-width="5"
        stroke-linecap="round" />

  <!-- Endpoint markers -->
  <circle cx="200" cy="720" r="9" fill="#fafafa" />
  <circle cx="1400" cy="200" r="9" fill="#fafafa" />

  <!-- Control-point handles (bezier visualization) -->
  <g stroke="#fafafa" stroke-opacity="0.4" stroke-dasharray="6 6">
    <line x1="200" y1="720" x2="600" y2="720" />
    <line x1="1000" y1="200" x2="1400" y2="200" />
  </g>
  <circle cx="600" cy="720" r="7" fill="#0a0a0b" stroke="#fafafa" stroke-opacity="0.6" stroke-width="2" />
  <circle cx="1000" cy="200" r="7" fill="#0a0a0b" stroke="#fafafa" stroke-opacity="0.6" stroke-width="2" />

  <!-- Tiny measurement tick to signal precision/detail -->
  <g stroke="#fafafa" stroke-opacity="0.5" stroke-width="1.5">
    <line x1="1400" y1="200" x2="1450" y2="200" />
    <line x1="1430" y1="190" x2="1430" y2="210" />
  </g>
</svg>
