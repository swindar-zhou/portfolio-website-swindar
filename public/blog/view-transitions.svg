<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A small thumbnail morphing into a larger panel along a curved path">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b" />
      <stop offset="1" stop-color="#18181b" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#fafafa" stop-opacity="0.14" />
      <stop offset="0.7" stop-color="#fafafa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f23" />
      <stop offset="1" stop-color="#161618" />
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fafafa" stop-opacity="0.0" />
      <stop offset="0.5" stop-color="#fafafa" stop-opacity="0.7" />
      <stop offset="1" stop-color="#fafafa" stop-opacity="0.0" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.55" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glow)" />

  <!-- Background grid -->
  <g stroke="#fafafa" stroke-width="1" stroke-opacity="0.06">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600" />
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900" />
  </g>

  <!-- Ghost in-between frames (showing the morph) -->
  <g opacity="0.18">
    <rect x="360" y="380" width="220" height="130" rx="12" fill="url(#panel)" stroke="#3f3f46" stroke-width="1" />
    <rect x="560" y="320" width="320" height="200" rx="14" fill="url(#panel)" stroke="#3f3f46" stroke-width="1" />
    <rect x="820" y="240" width="440" height="280" rx="16" fill="url(#panel)" stroke="#3f3f46" stroke-width="1" />
  </g>

  <!-- Small source thumbnail (left) -->
  <g transform="translate(220 420)" filter="url(#softShadow)">
    <rect width="200" height="120" rx="10" fill="url(#panel)" stroke="#52525b" stroke-width="1" />
    <rect width="200" height="22" rx="10" fill="#0f0f12" />
    <rect y="11" width="200" height="11" fill="#0f0f12" />
    <circle cx="14" cy="11" r="3.5" fill="#52525b" />
    <circle cx="26" cy="11" r="3.5" fill="#52525b" />
    <circle cx="38" cy="11" r="3.5" fill="#52525b" />
    <!-- Mini content -->
    <rect x="14" y="40" width="120" height="8" rx="2" fill="#52525b" />
    <rect x="14" y="56" width="80" height="6" rx="2" fill="#3f3f46" />
    <rect x="14" y="78" width="170" height="28" rx="6" fill="#0f0f12" stroke="#3f3f46" />
  </g>

  <!-- Large destination panel (right) -->
  <g transform="translate(960 240)" filter="url(#softShadow)">
    <rect width="480" height="420" rx="16" fill="url(#panel)" stroke="#52525b" stroke-width="1" />
    <rect width="480" height="36" rx="16" fill="#0a0a0b" />
    <rect y="18" width="480" height="18" fill="#0a0a0b" />
    <circle cx="22" cy="18" r="5" fill="#71717a" />
    <circle cx="40" cy="18" r="5" fill="#71717a" />
    <circle cx="58" cy="18" r="5" fill="#71717a" />
    <!-- Header -->
    <rect x="28" y="62" width="240" height="20" rx="5" fill="#fafafa" fill-opacity="0.85" />
    <rect x="28" y="94" width="380" height="10" rx="3" fill="#3f3f46" />
    <rect x="28" y="112" width="300" height="10" rx="3" fill="#3f3f46" />
    <!-- Body content -->
    <rect x="28" y="148" width="200" height="120" rx="8" fill="#0f0f12" stroke="#3f3f46" />
    <rect x="244" y="148" width="200" height="120" rx="8" fill="#0f0f12" stroke="#3f3f46" />
    <rect x="28" y="288" width="416" height="14" rx="3" fill="#3f3f46" />
    <rect x="28" y="310" width="360" height="14" rx="3" fill="#3f3f46" />
    <rect x="28" y="356" width="120" height="30" rx="6" fill="#fafafa" fill-opacity="0.85" />
  </g>

  <!-- Connecting morph curve -->
  <path d="M 420 480 C 620 320, 820 320, 960 360" fill="none" stroke="url(#trail)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8" />

  <!-- Endpoint dots on the curve -->
  <circle cx="420" cy="480" r="6" fill="#fafafa" />
  <circle cx="960" cy="360" r="6" fill="#fafafa" />
</svg>
